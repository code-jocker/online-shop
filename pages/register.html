<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — Cleverstore</title>
  <link rel="stylesheet" href="../css/style.css"/>
  
  <style>
    .auth-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: linear-gradient(135deg, #ede9fe 0%, #e0e7ff 50%, #dbeafe 100%);
    }

    .auth-box {
      background: #fff;
      border-radius: var(--radius-xl);
      padding: 44px 40px;
      width: 100%;
      max-width: 480px;
      box-shadow: var(--shadow-xl);
      border: 2px solid var(--primary-light);
    }

    .auth-logo {
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 8px;
      letter-spacing: -0.8px;
      color: var(--gray-900);
    }

    .auth-logo span { color: var(--primary); }

    .auth-subtitle {
      color: var(--gray-500);
      font-size: 0.95rem;
      margin-bottom: 32px;
    }

    .form-error {
      background: var(--danger-light);
      border: 1px solid #fecaca;
      color: #b91c1c;
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      font-size: 0.85rem;
      margin-bottom: 20px;
      display: none;
      line-height: 1.5;
      font-weight: 500;
    }

    .auth-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 0.9rem;
      color: var(--gray-500);
    }

    .auth-footer a { color: var(--primary); font-weight: 700; text-decoration: none; }
    .auth-footer a:hover { text-decoration: underline; }

    .divider {
      text-align: center;
      color: var(--gray-400);
      font-size: 0.8rem;
      margin: 20px 0;
      position: relative;
      font-weight: 500;
    }

    .divider::before, .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 42%;
      height: 1px;
      background: var(--gray-200);
    }
    .divider::before { left: 0; }
    .divider::after  { right: 0; }
  </style>
</head>
<body>

  <div class="auth-wrap">
    <div class="auth-box">

      <div class="auth-logo">Clever <span>store</span></div>
      <p class="auth-subtitle">Create your account to get started</p>

      <div class="form-error" id="reg-error"></div>

      <div class="form-group" style="margin-bottom:16px;">
        <label>Full Name *</label>
        <input type="text" id="reg-name" placeholder="e.g. John Felix"/>
      </div>

      <div class="form-group" style="margin-bottom:16px;">
        <label>Email *</label>
        <input type="email" id="reg-email" placeholder="jane@example.com"/>
      </div>

      <div class="form-group" style="margin-bottom:16px;">
        <label>Phone Number *</label>
        <input type="tel" id="reg-phone" placeholder="+1234567890"/>
      </div>

      <div class="form-group" style="margin-bottom:16px;">
        <label>Location *</label>
        <input type="text" id="reg-location" placeholder="e.g. Kigali"/>
      </div>

      <div class="form-group" style="margin-bottom:16px;">
        <label>Gender *</label>
        <select id="reg-gender">
          <option value="">Select gender</option>
          <option value="male">Male</option>
          <option value="female">Female</option>
          <option value="other">Other</option>
        </select>
      </div>

      <div class="form-group" style="margin-bottom:16px;">
        <label>Age *</label>
        <input type="number" id="reg-age" placeholder="e.g. 25" min="1"/>
      </div>

      <div class="form-group" style="margin-bottom:16px;">
        <label>Date of Birth *</label>
        <input type="date" id="reg-dob"/>
      </div>

      <div class="form-group" style="margin-bottom:16px;">
        <label>Account Type *</label>
        <select id="reg-type">
          <option value="customer">Customer</option>
          <option value="seller">Seller</option>
        </select>
      </div>

      <div class="form-group" style="margin-bottom:24px;">
        <label>Password *</label>
        <input type="password" id="reg-password" placeholder="Min 4 characters"
          onkeydown="if(event.key==='Enter') register()"/>
      </div>

      <button class="btn btn-blue" id="btn-register" onclick="register()" style="width:100%;justify-content:center;padding:14px 22px;font-size:1rem;">
        Create Account
      </button>

      <div class="divider">or</div>

      <div class="auth-footer">
        Already have an account? <a href="login.html">Log in</a>
      </div>

    </div>
  </div>

  <script src="../js/auth.js"></script>
  <script>
    requireGuest();
  </script>
</body>
</html>
